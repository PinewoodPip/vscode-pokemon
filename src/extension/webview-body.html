<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!--
        Use a content security policy to only allow loading images from https or from our extension directory,
        and only allow scripts that have a specific nonce.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {cspSource} 'nonce-{nonce}'; img-src {cspSource} https:; script-src 'nonce-{nonce}'; font-src {cspSource};">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{stylesResetUri}" rel="stylesheet" nonce="{nonce}">
    <link href="{tailwindCSSUri}" rel="stylesheet" nonce="{nonce}">
    <link href="{stylesMainUri}" rel="stylesheet" nonce="{nonce}">
    <link href="{moveTypesCSSUri}" rel="stylesheet" nonce="{nonce}">
    <style nonce="{nonce}">
        @font-face {
            font-family: 'silkscreen';
            src: url('{silkScreenFontPath}') format('truetype');
        }
    </style>
    <title>VS Code Pokemon</title>
</head>
<body>
    <canvas id="pokemonCanvas"></canvas>
    <div id="pokemonContainer"></div>
    <div id="foreground"></div>
    <div id="pokemonTooltip" class="pokemon-tooltip"></div>
    <div id="lobbyContainer"></div>
    <div id="combatContainer"></div>
    <div id="boxContainer"></div>
    <div id="detailsContainer"></div>
    <script nonce="{nonce}" src="{scriptUri}"></script>
    <script nonce="{nonce}">
        pokemonApp.pokemonPanelApp(
            "{basePokemonUri}",
            "{theme}",
            {themeKind},
            "{pokemonColor}",
            "{pokemonSize}",
            "{pokemonType}",
            "{throwBallWithMouse}",
            "{pokemonGeneration}",
            "{pokemonOriginalSpriteSize}"
        );
    </script>
</body>
</html>
